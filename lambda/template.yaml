AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Receipt extractor Lambda (Bedrock Claude 3.5 Sonnet + Pillow)

Parameters:
  SourceBucketName:
    Type: String
    Description: S3 bucket name for receipt uploads
  SourcePrefix:
    Type: String
    Default: receipts/
    Description: S3 key prefix to trigger Lambda
  MaxImageEdge:
    Type: Number
    Default: 1200
  JpegQuality:
    Type: Number
    Default: 75

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Tracing: Active

Resources:
  ReceiptExtractorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: receipt-extractor-haiku
      CodeUri: .
      Handler: receipt_extractor_handler.lambda_handler
      Environment:
        Variables:
          MAX_IMAGE_EDGE: !Ref MaxImageEdge
          JPEG_QUALITY: !Ref JpegQuality
          BEDROCK_MODEL_ID: "anthropic.claude-3-5-sonnet-20240620-v1:0"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${SourceBucketName}/*"
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:ap-northeast-1::foundation-model/anthropic.claude-3-5-sonnet-20240620-v1:0
      Events:
        S3UploadTrigger:
          Type: S3
          Properties:
            Bucket: !Ref SourceBucketName
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: !Ref SourcePrefix
Outputs:
  ReceiptExtractorFunctionArn:
    Description: ARN of receipt extractor Lambda
    Value: !GetAtt ReceiptExtractorFunction.Arn
