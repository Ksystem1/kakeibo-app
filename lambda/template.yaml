AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Receipt extractor Lambda (Bedrock Claude 3.5 Sonnet + Pillow)

Parameters:
  SourceBucketName:
    Type: String
    Description: S3 bucket name for receipt uploads
  SourcePrefix:
    Type: String
    Default: receipts/
    Description: S3 key prefix to trigger Lambda
  MaxImageEdge:
    Type: Number
    Default: 1200
  JpegQuality:
    Type: Number
    Default: 75

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Tracing: Active

Resources:
  ReceiptExtractorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: receipt-extractor-haiku
      CodeUri: .
      Handler: receipt_extractor_handler.lambda_handler
      Environment:
        Variables:
          MAX_IMAGE_EDGE: !Ref MaxImageEdge
          JPEG_QUALITY: !Ref JpegQuality
          # ap-northeast-1: 推論プロファイルは apac.（us. は無効 → InvokeModel ValidationException）
          BEDROCK_MODEL_ID: "apac.anthropic.claude-3-5-sonnet-20241022-v2:0"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "arn:aws:s3:::${SourceBucketName}/*"
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - "*"
  # 既存 S3 バケットはテンプレート外で管理。通知はコンソール/CLI で Lambda に紐づけ、本リソースで s3 からの invoke を許可する。
  AllowS3ToInvokeLambda:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ReceiptExtractorFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::${SourceBucketName}"
Outputs:
  ReceiptExtractorFunctionArn:
    Description: ARN of receipt extractor Lambda
    Value: !GetAtt ReceiptExtractorFunction.Arn
