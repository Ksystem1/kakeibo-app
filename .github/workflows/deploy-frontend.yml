# Ksystem ドメイン向け: ビルドした静的ファイルを S3 に配置し CloudFront を無効化する。
# Secrets: AWS_ROLE_TO_ASSUME, AWS_REGION, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID, VITE_API_URL, VERIFY_LOGIN_ID, VERIFY_LOGIN_PASSWORD
# Optional: APP_RUNNER_SERVICE_ARN (set only when App Runner backend deploy is needed)
name: Deploy frontend (S3 + CloudFront)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # 本番 URL: https://<ドメイン>/kakeibo/ （Vite base: /kakeibo/）
      - name: Deploy and verify login
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          VERIFY_APP_URL: https://ksystemapp.com/kakeibo/login
          VERIFY_API_URL: ${{ secrets.VITE_API_URL }}
          VERIFY_LOGIN_ID: ${{ secrets.VERIFY_LOGIN_ID }}
          VERIFY_LOGIN_PASSWORD: ${{ secrets.VERIFY_LOGIN_PASSWORD }}
          # Optional: deploy-backend-apprunner.mjs will skip backend step when empty
          APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: npm run deploy:auto
