# Ksystem ドメイン向け: ビルドした静的ファイルを S3 に配置し CloudFront を無効化する。
# Secrets: AWS_ROLE_TO_ASSUME, AWS_REGION, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID, VITE_API_URL, VERIFY_LOGIN_ID, VERIFY_LOGIN_PASSWORD
#
# Step 3（HTTPS API）: Repository → Settings → Secrets and variables → Actions
#   VITE_API_URL = https://api.ksystemapp.com  （末尾スラッシュなし。ECS+ALB+ACM+Route53 後に http:// から差し替え）
name: Deploy frontend (S3 + CloudFront)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # 未設定だと空文字になり S3/STS のリージョン解釈がブレるため既定を明示
      AWS_REGION: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'ap-northeast-1' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # S3_BUCKET: 未設定は既定。レガシー名（ksystem-kakeibo-*）は削除済みで NoSuchBucket になりやすいので既定へ寄せる
      - name: Resolve S3 bucket for deploy
        id: s3
        shell: bash
        env:
          SECRET_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          DEFAULT=ksystemapp-web-production
          b=$(printf '%s' "${SECRET_BUCKET:-}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          if [ -z "$b" ]; then
            echo "Using default S3 bucket (secret empty): $DEFAULT"
            echo "bucket=$DEFAULT" >> "$GITHUB_OUTPUT"
          elif [[ "$b" == ksystem-kakeibo-* ]]; then
            echo "::warning::S3_BUCKET がレガシー SPA 用バケット名（$b）です。削除済みの場合は NoSuchBucket になります。$DEFAULT に切り替えます。GitHub の S3_BUCKET を空にするか $DEFAULT に更新してください。"
            echo "bucket=$DEFAULT" >> "$GITHUB_OUTPUT"
          else
            echo "Using S3 bucket from secret: $b"
            echo "bucket=$b" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify S3 bucket exists
        env:
          S3_BUCKET: ${{ steps.s3.outputs.bucket }}
        run: aws s3api head-bucket --bucket "$S3_BUCKET" --region "$AWS_REGION"

      # 本番 URL: https://<ドメイン>/kakeibo/ （Vite base: /kakeibo/）
      # VITE_API_URL はこのステップの env 経由で npm run build に渡る（.env.production より優先）。
      # HTTPS フロントから http:// API は Mixed Content のため deploy-production.mjs が GITHUB_ACTIONS 時に失敗させる。
      - name: Deploy frontend to S3 and CloudFront
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          S3_BUCKET: ${{ steps.s3.outputs.bucket }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
          GITHUB_ACTIONS: "true"
        run: npm run deploy:prod
