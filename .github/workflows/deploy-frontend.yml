# Ksystem ドメイン向け: ビルドした静的ファイルを S3 に配置し CloudFront を無効化する。
# Secrets: AWS_ROLE_TO_ASSUME, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID, VITE_API_URL, VERIFY_LOGIN_ID, VERIFY_LOGIN_PASSWORD, APP_RUNNER_SERVICE_ARN
name: Deploy frontend (S3 + CloudFront)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      # 本番 URL: https://<ドメイン>/kakeibo/ （Vite base: /kakeibo/）
      - name: Deploy and verify login
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          VERIFY_APP_URL: https://ksystemapp.com/kakeibo/login
          VERIFY_API_URL: ${{ secrets.VITE_API_URL }}
          VERIFY_LOGIN_ID: ${{ secrets.VERIFY_LOGIN_ID }}
          VERIFY_LOGIN_PASSWORD: ${{ secrets.VERIFY_LOGIN_PASSWORD }}
          APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
          AWS_REGION: ap-northeast-1
        run: |
          if [ -z "$VITE_API_URL" ]; then echo "::error::GitHub Secret VITE_API_URL が未設定です"; exit 1; fi
          if [ -z "$S3_BUCKET" ]; then echo "::error::GitHub Secret S3_BUCKET が未設定です"; exit 1; fi
          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then echo "::error::GitHub Secret CLOUDFRONT_DISTRIBUTION_ID が未設定です"; exit 1; fi
          if [ -z "$APP_RUNNER_SERVICE_ARN" ]; then echo "::error::GitHub Secret APP_RUNNER_SERVICE_ARN が未設定です"; exit 1; fi
          if [ -z "$VERIFY_LOGIN_ID" ]; then echo "::error::GitHub Secret VERIFY_LOGIN_ID が未設定です"; exit 1; fi
          if [ -z "$VERIFY_LOGIN_PASSWORD" ]; then echo "::error::GitHub Secret VERIFY_LOGIN_PASSWORD が未設定です"; exit 1; fi
          npm run deploy:auto
