# Ksystem ドメイン向け: ビルドした静的ファイルを S3 に配置し CloudFront を無効化する。
# Secrets: AWS_ROLE_TO_ASSUME, AWS_REGION, S3_BUCKET, CLOUDFRONT_DISTRIBUTION_ID, VITE_API_URL, VERIFY_LOGIN_ID, VERIFY_LOGIN_PASSWORD
#
# Step 3（HTTPS API）: Repository → Settings → Secrets and variables → Actions
#   VITE_API_URL = https://api.ksystemapp.com  （末尾スラッシュなし。ECS+ALB+ACM+Route53 後に http:// から差し替え）
name: Deploy frontend (S3 + CloudFront)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # 本番 URL: https://<ドメイン>/kakeibo/ （Vite base: /kakeibo/）
      # VITE_API_URL はこのステップの env 経由で npm run build に渡る（.env.production より優先）。
      # HTTPS フロントから http:// API は Mixed Content のため deploy-production.mjs が GITHUB_ACTIONS 時に失敗させる。
      - name: Deploy frontend to S3 and CloudFront
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
          GITHUB_ACTIONS: "true"
        run: npm run deploy:prod
