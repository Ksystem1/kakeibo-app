name: Deploy backend (ECS Fargate + Terraform)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/terraform-ecs-express/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.repository == 'Ksystem1/kakeibo-app'
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_TO_ASSUME_ARN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
      ECR_REPOSITORY: kakeibo-api
      TF_WORKING_DIR: infra/terraform-ecs-express
      TF_VAR_vpc_id: ${{ secrets.TF_VAR_VPC_ID }}
      TF_VAR_public_subnet_ids: ${{ secrets.TF_VAR_PUBLIC_SUBNET_IDS }}
      TF_VAR_private_subnet_ids: ${{ secrets.TF_VAR_PRIVATE_SUBNET_IDS }}
      TF_VAR_github_repository: Ksystem1/kakeibo-app
      TF_VAR_github_branch: main
      TF_VAR_github_oidc_provider_arn: ${{ secrets.GITHUB_OIDC_PROVIDER_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify S3 backend bucket exists
        run: aws s3api head-bucket --bucket "${{ env.TF_STATE_BUCKET }}" --region "${{ env.AWS_REGION }}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" ./backend
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false -no-color -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_vpc_id: ${{ env.TF_VAR_vpc_id }}
          TF_VAR_public_subnet_ids: ${{ env.TF_VAR_public_subnet_ids }}
          TF_VAR_private_subnet_ids: ${{ env.TF_VAR_private_subnet_ids }}
          TF_VAR_github_repository: ${{ env.TF_VAR_github_repository }}
          TF_VAR_github_branch: ${{ env.TF_VAR_github_branch }}
          TF_VAR_github_oidc_provider_arn: ${{ env.TF_VAR_github_oidc_provider_arn }}
        run: |
          terraform plan -input=false -no-color \
            -var="container_image=${{ steps.image.outputs.image_uri }}" \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_vpc_id: ${{ env.TF_VAR_vpc_id }}
          TF_VAR_public_subnet_ids: ${{ env.TF_VAR_public_subnet_ids }}
          TF_VAR_private_subnet_ids: ${{ env.TF_VAR_private_subnet_ids }}
          TF_VAR_github_repository: ${{ env.TF_VAR_github_repository }}
          TF_VAR_github_branch: ${{ env.TF_VAR_github_branch }}
          TF_VAR_github_oidc_provider_arn: ${{ env.TF_VAR_github_oidc_provider_arn }}
        run: terraform apply -input=false -no-color -auto-approve tfplan
