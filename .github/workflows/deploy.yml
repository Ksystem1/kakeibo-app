name: Deploy backend (ECS Fargate + Terraform)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/terraform-ecs-express/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.repository == 'Ksystem1/kakeibo-app'
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      AWS_REGION: ap-northeast-1
      ECR_REPOSITORY: kakeibo-api
      TF_WORKING_DIR: infra/terraform-ecs-express
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.TF_STATE_BUCKET }}" || (echo "::error::Missing secret TF_STATE_BUCKET" && exit 1)
          test -n "${{ secrets.TF_STATE_KEY }}" || (echo "::error::Missing secret TF_STATE_KEY" && exit 1)
          test -n "${{ secrets.TF_VAR_VPC_ID }}" || (echo "::error::Missing secret TF_VAR_VPC_ID" && exit 1)
          test -n "${{ secrets.TF_VAR_PUBLIC_SUBNET_IDS }}" || (echo "::error::Missing secret TF_VAR_PUBLIC_SUBNET_IDS" && exit 1)
          test -n "${{ secrets.TF_VAR_PRIVATE_SUBNET_IDS }}" || (echo "::error::Missing secret TF_VAR_PRIVATE_SUBNET_IDS" && exit 1)
          test -n "${{ secrets.GITHUB_OIDC_PROVIDER_ARN }}" || (echo "::error::Missing secret GITHUB_OIDC_PROVIDER_ARN" && exit 1)

      - name: Verify S3 backend bucket exists
        run: aws s3api head-bucket --bucket "${{ secrets.TF_STATE_BUCKET }}" --region "${{ env.AWS_REGION }}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" ./backend
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false -no-color -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_vpc_id: ${{ secrets.TF_VAR_VPC_ID }}
          TF_VAR_public_subnet_ids: ${{ secrets.TF_VAR_PUBLIC_SUBNET_IDS }}
          TF_VAR_private_subnet_ids: ${{ secrets.TF_VAR_PRIVATE_SUBNET_IDS }}
          TF_VAR_github_repository: Ksystem1/kakeibo-app
          TF_VAR_github_branch: main
          TF_VAR_github_oidc_provider_arn: ${{ secrets.GITHUB_OIDC_PROVIDER_ARN }}
        run: |
          terraform plan -input=false -no-color \
            -var="container_image=${{ steps.image.outputs.image_uri }}" \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_vpc_id: ${{ secrets.TF_VAR_VPC_ID }}
          TF_VAR_public_subnet_ids: ${{ secrets.TF_VAR_PUBLIC_SUBNET_IDS }}
          TF_VAR_private_subnet_ids: ${{ secrets.TF_VAR_PRIVATE_SUBNET_IDS }}
          TF_VAR_github_repository: Ksystem1/kakeibo-app
          TF_VAR_github_branch: main
          TF_VAR_github_oidc_provider_arn: ${{ secrets.GITHUB_OIDC_PROVIDER_ARN }}
        run: terraform apply -input=false -no-color -auto-approve tfplan
