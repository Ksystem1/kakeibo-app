# RDS の DDL（db/migration_*.sql）はこのワークフローでは実行しません。
# 本番適用はスナップショット取得のうえ、手元から npm run db:migrate-v8 等、または mysql で流し込んでください。
name: Deploy backend (ECS Fargate + Terraform)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/terraform-ecs-express/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.repository == 'Ksystem1/kakeibo-app'
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      # 未設定時に terraform init の backend region が空にならないよう既定値を持たせる
      AWS_REGION: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'ap-northeast-1' }}
      AWS_ROLE_TO_ASSUME_ARN: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ROLE_TO_ASSUME_FALLBACK: arn:aws:iam::345362761619:role/kakeibo-api-github-actions-deploy-role
      TF_STATE_BUCKET: ksystemapp-web-production
      TF_STATE_KEY: kakeibo/terraform/ecs-express.tfstate
      ECR_REPOSITORY: kakeibo-api
      TF_WORKING_DIR: infra/terraform-ecs-express
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME_ARN || env.AWS_ROLE_TO_ASSUME_FALLBACK }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Preflight env for Terraform backend
        run: |
          echo "AWS_REGION=${AWS_REGION}"
          echo "TF_STATE_BUCKET=${TF_STATE_BUCKET}"
          echo "TF_STATE_KEY=${TF_STATE_KEY}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" ./backend
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false -no-color -reconfigure \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_stripe_test_price_id: ${{ secrets.STRIPE_TEST_PRICE_ID }}
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          terraform plan -input=false -no-color \
            -var-file=terraform.tfvars \
            -var="container_image=${{ steps.image.outputs.image_uri }}" \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_stripe_test_price_id: ${{ secrets.STRIPE_TEST_PRICE_ID }}
          TF_VAR_stripe_secret_key: ${{ secrets.STRIPE_SECRET_KEY }}
        run: terraform apply -input=false -no-color -auto-approve tfplan
